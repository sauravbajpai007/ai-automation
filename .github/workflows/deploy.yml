name: Ollama AI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-paths:
    name: Validate repo layout
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect layout and verify files
        run: |
          set -euo pipefail

          if [[ -d ai-automation/coder/ai && -f ai-automation/coder/index.js ]]; then
            R="ai-automation/coder"
          elif [[ -d ai && -f index.js && -f package.json ]]; then
            R="."
          else
            echo "Invalid repo structure"
            ls -la
            exit 1
          fi

          echo "CODER_ROOT=$R" >> $GITHUB_ENV

          for name in ai_code_review ai_test_generator ai_decision ai_rollback; do
            test -f "$R/ai/${name}.sh"
          done

          test -f "$R/index.js"
          test -f "$R/package.json"

          for s in "$R/ai/"*.sh; do
            bash -n "$s"
          done

  ai-code-review:
    name: AI Code Review
    needs: validate-paths
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve CODER_ROOT
        run: |
          if [[ -d ai-automation/coder/ai ]]; then
            echo "CODER_ROOT=ai-automation/coder" >> $GITHUB_ENV
          else
            echo "CODER_ROOT=." >> $GITHUB_ENV
          fi

      - uses: ./.github/actions/setup-ollama

      - name: Run AI Review
        working-directory: ${{ env.CODER_ROOT }}
        run: |
          chmod +x ai/*.sh
          ./ai/ai_code_review.sh

  build-install-ai-testgen:
    name: Build & AI Test Generation
    needs: validate-paths
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve CODER_ROOT
        run: |
          if [[ -d ai-automation/coder/ai ]]; then
            echo "CODER_ROOT=ai-automation/coder" >> $GITHUB_ENV
          else
            echo "CODER_ROOT=." >> $GITHUB_ENV
          fi

      - uses: ./.github/actions/setup-ollama

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ env.CODER_ROOT }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run AI Test Generator
        working-directory: ${{ env.CODER_ROOT }}
        run: |
          chmod +x ai/*.sh
          ./ai/ai_test_generator.sh

  ai-decision:
    name: AI Decision
    needs: build-install-ai-testgen
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve CODER_ROOT
        run: |
          if [[ -d ai-automation/coder/ai ]]; then
            echo "CODER_ROOT=ai-automation/coder" >> $GITHUB_ENV
          else
            echo "CODER_ROOT=." >> $GITHUB_ENV
          fi

      - uses: ./.github/actions/setup-ollama

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ env.CODER_ROOT }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run AI Decision
        working-directory: ${{ env.CODER_ROOT }}
        run: |
          chmod +x ai/*.sh
          ./ai/ai_decision.sh

  ai-rollback:
    name: Auto Rollback
    needs: ai-decision
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git Auth
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Rollback last commit
        run: |
          git reset --hard HEAD~1
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
